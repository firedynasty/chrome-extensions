<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #2d1b00;
      color: #e0d5c0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #f5e6c8;
      text-align: center;
      font-style: italic;
    }
    label {
      display: block;
      font-size: 11px;
      color: #c9b99a;
      margin-bottom: 3px;
      font-weight: 600;
    }
    select {
      width: 100%;
      padding: 7px 8px;
      border: 1px solid #8b7355;
      border-radius: 5px;
      background: #3d2b10;
      color: #f5e6c8;
      font-size: 13px;
      margin-bottom: 10px;
      cursor: pointer;
    }
    select:focus {
      outline: none;
      border-color: #d4a855;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #openBtn {
      background: linear-gradient(45deg, #b8860b, #d4a855);
      margin-top: 4px;
    }
    #openBtn:hover {
      background: linear-gradient(45deg, #d4a855, #e6c47a);
    }
    #status {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      color: #8b7355;
    }
    .success { color: #a8d08d !important; }
    .error { color: #e74c3c !important; }
  </style>
</head>
<body>
  <h2>Cursive Bible</h2>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
    <label style="margin:0;display:flex;align-items:center;gap:4px;cursor:pointer;">
      <input type="checkbox" id="groupToggle"> Groupings
    </label>
  </div>
  <div id="groupSection" style="display:none;">
    <label>Collection</label>
    <select id="groupSelect"></select>
  </div>
  <div id="bibleSection">
    <label>Book</label>
    <select id="bookSelect"></select>
    <label>Chapter</label>
    <select id="chapterSelect"></select>
  </div>
  <button id="openBtn">Open Cursive</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
