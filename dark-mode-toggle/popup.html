<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #fff;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 6px;
    }
    #toggleBtn {
      background: #8e44ad;
    }
    #toggleBtn:hover {
      background: #7d3c98;
    }
    .slider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0 4px 0;
      font-size: 12px;
      color: #ccc;
    }
    input[type="range"] {
      width: 130px;
      accent-color: #8e44ad;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #aaa;
    }
    .success { color: #2ecc71 !important; }
    .error { color: #e74c3c !important; }
  </style>
</head>
<body>
  <h2>Dark Mode</h2>
  <button id="toggleBtn">Toggle Dark Mode</button>
  <div class="slider-row">
    <span>Brightness</span>
    <input type="range" id="brightness" min="50" max="100" value="80">
  </div>
  <div class="slider-row">
    <span>Contrast</span>
    <input type="range" id="contrast" min="80" max="120" value="100">
  </div>
  <div id="status">Applies to current tab only</div>
  <script src="popup.js"></script>
</body>
</html>
