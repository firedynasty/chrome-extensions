<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #fff;
      text-align: center;
    }
    #noteInput {
      width: 100%;
      padding: 8px;
      border: 1px solid #3ea6ff;
      border-radius: 6px;
      background: #0f0f23;
      color: #e0e0e0;
      font-size: 13px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }
    #noteInput::placeholder {
      color: #666;
    }
    #notesArea {
      width: 100%;
      padding: 8px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #0f0f23;
      color: #e0e0e0;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      margin-bottom: 8px;
      box-sizing: border-box;
      resize: vertical;
    }
    #notesArea::placeholder {
      color: #666;
    }
    .btn-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #stampBtn { background: #3ea6ff; color: #000; }
    #stampBtn:hover { background: #5bb8ff; }
    #clearBtn { background: #e74c3c; }
    #clearBtn:hover { background: #c0392b; }
    #saveBtn { background: #27ae60; }
    #saveBtn:hover { background: #219a52; }
    #copyBtn { background: #8e44ad; }
    #copyBtn:hover { background: #7d3c98; }
    #entries {
      margin-top: 10px;
      max-height: 250px;
      overflow-y: auto;
      font-size: 12px;
      font-family: 'Courier New', monospace;
    }
    .entry {
      padding: 4px 0;
      border-bottom: 1px solid #2a2a4a;
    }
    .entry-ts {
      color: #3ea6ff;
      font-weight: bold;
    }
    .entry-note {
      color: #ccc;
      margin-left: 4px;
    }
    #status {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #aaa;
    }
    .success { color: #2ecc71 !important; }
    .error { color: #e74c3c !important; }
    #count {
      font-size: 11px;
      color: #666;
      text-align: right;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <h2>Timestamp Logger</h2>
  <div class="btn-row" style="margin-bottom:10px;">
    <button id="toggleBarBtn" style="background:#2c3e50;">Hide Bar</button>
  </div>
  <input id="noteInput" type="text" placeholder="Note (optional) — press Enter to stamp">
  <div class="btn-row">
    <button id="stampBtn">Stamp</button>
    <button id="clearBtn">Clear</button>
  </div>
  <div class="btn-row">
    <button id="saveBtn">Save .txt</button>
    <button id="copyBtn">Copy</button>
  </div>
  <textarea id="notesArea" placeholder="Notes (saved to info.txt)" rows="3"></textarea>
  <div id="count"></div>
  <div id="entries"></div>
  <div id="status">Stamp timestamps while watching</div>
  <script src="popup.js"></script>
</body>
</html>
