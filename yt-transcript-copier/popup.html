<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 250px;
      padding: 16px;
      font-family: -apple-system, sans-serif;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background: #cc0000;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:active {
      background: #990000;
    }
    #status {
      margin-top: 10px;
      font-size: 13px;
      min-height: 20px;
    }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>
  <button id="copyBtn">Copy Transcript</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
