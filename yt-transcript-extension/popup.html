<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 15px;
      color: #fff;
      text-align: center;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #e74c3c;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #c0392b;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #aaa;
    }
    .success { color: #2ecc71 !important; }
    .error { color: #e74c3c !important; }
  </style>
</head>
<body>
  <h2>Audio Visualizer</h2>
  <button id="toggleBtn">Toggle Visualizer</button>
  <div id="status">Click to overlay on current page</div>
  <script src="popup.js"></script>
</body>
</html>
